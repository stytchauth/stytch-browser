name: deploy-clientside-services
on:
  workflow_call:
    inputs:
      s3_bucket:
        required: true
        type: string
      sha_to_deploy:
        required: true
        type: string
      env:
        required: true
        type: string
    secrets:
      honeycomb_api_key:
        required: true
      cloudfront_distribution_id:
        required: true
      ci_aws_access_key_id:
        required: true
      ci_aws_secret_access_key:
        required: true
env:
  BUILDEVENT_APIKEY: ${{ secrets.honeycomb_api_key }}
  BUILDEVENT_DATASET: 'stytch-ci'
  BUILDEVENT_CIPROVIDER: 'github-actions'
jobs:
  deploy:
    environment: ${{ inputs.env }}
    name: Deploy One Tap
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: ${{ inputs.s3_bucket }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          ref: ${{ inputs.sha_to_deploy }}
          persist-credentials: false

      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'

      - name: Install node dependencies
        run: yarn install --immutable

      - name: Choose env file for environment
        env:
          ENV: ${{ inputs.env }}
        run: |
          cp ./services/clientside-services/.env.$ENV ./services/clientside-services/.env
          cat ./services/clientside-services/.env

      - name: Build
        run: |
          yarn build:clientside-services

      - name: Configure AWS credentials from account
        uses: aws-actions/configure-aws-credentials@5fd3084fc36e372ff1fff382a39b10d03659f355 # v2.2.0
        with:
          aws-access-key-id: ${{ secrets.ci_aws_access_key_id }}
          aws-secret-access-key: ${{ secrets.ci_aws_secret_access_key }}
          aws-region: us-east-1

      - name: Upload immutable assets to S3
        run: aws s3 sync ./services/clientside-services/dist/ s3://$S3_BUCKET/clientside-services --exclude "index.html" --cache-control max-age=604800,public

      - name: Upload mutable index.html to S3
        run: aws s3 cp ./services/clientside-services/dist/index.html s3://$S3_BUCKET/clientside-services/index.html --cache-control max-age=600,public

      - name: Invalidate Cloudfront Cache
        run: aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/clientside-services/*"
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.cloudfront_distribution_id }}
