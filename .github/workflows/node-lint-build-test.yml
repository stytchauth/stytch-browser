# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions
name: Monorepo Build
on:
  workflow_call:
    secrets:
      honeycomb_api_key:
        required: true
      CHROMATIC_PROJECT_TOKEN:
        required: true
env:
  BUILDEVENT_APIKEY: ${{ secrets.honeycomb_api_key }}
  BUILDEVENT_DATASET: 'stytch-ci'
  BUILDEVENT_CIPROVIDER: 'github-actions'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: install honeycomb buildevents tool
        run: |
          echo $(date +%s) > ../step_start
          echo $(echo node-build | sum | cut -f 1 -d \ ) > ../step_span_id
          curl -L -o /usr/local/bin/buildevents https://github.com/honeycombio/buildevents/releases/download/v0.7.1/buildevents-linux-amd64
          chmod 755 /usr/local/bin/buildevents
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - name: Install dependencies
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-install -- yarn install --immutable
      - name: Verify string extraction
        run: |
          buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-strings -- yarn strings
          if ! git diff --quiet; then
            echo "yarn strings generated changes. Please run it locally and commit the results."
            git diff
            exit 1
          fi
      - name: Build Packages
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-build -- yarn build
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-artifacts
          include-hidden-files: true
          path: |
            packages/*/dist/
            packages/*/build/
            apps/*/dist/
            apps/*/build/
            apps/*/.next/
            !apps/*/.next/cache/
            internal/*/dist/
          retention-days: 1
      - name: Upload Sonda report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sonda-reports
          include-hidden-files: true
          path: |
            apps/*/.sonda/
            apps/react-sizes/dist/
            apps/other-framework-demo/dist/
          retention-days: 90
      - name: Finish step
        run: buildevents step $GITHUB_RUN_ID $(cat ../step_span_id) $(cat ../step_start) node-build

  lint:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: install honeycomb buildevents tool
        run: |
          echo $(date +%s) > ../step_start
          echo $(echo node-lint | sum | cut -f 1 -d \ ) > ../step_span_id
          curl -L -o /usr/local/bin/buildevents https://github.com/honeycombio/buildevents/releases/download/v0.7.1/buildevents-linux-amd64
          chmod 755 /usr/local/bin/buildevents
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - name: Install dependencies
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-install -- yarn install --immutable
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-artifacts
      - name: Run linter
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-lint -- yarn lint
      - name: Finish step
        run: buildevents step $GITHUB_RUN_ID $(cat ../step_span_id) $(cat ../step_start) node-lint

  typecheck:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: install honeycomb buildevents tool
        run: |
          echo $(date +%s) > ../step_start
          echo $(echo node-typecheck | sum | cut -f 1 -d \ ) > ../step_span_id
          curl -L -o /usr/local/bin/buildevents https://github.com/honeycombio/buildevents/releases/download/v0.7.1/buildevents-linux-amd64
          chmod 755 /usr/local/bin/buildevents
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - name: Install dependencies
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-install -- yarn install --immutable
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-artifacts
      - name: Run type check
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-typecheck -- yarn typecheck
      - name: Finish step
        run: buildevents step $GITHUB_RUN_ID $(cat ../step_span_id) $(cat ../step_start) node-typecheck

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: install honeycomb buildevents tool
        run: |
          echo $(date +%s) > ../step_start
          echo $(echo node-test | sum | cut -f 1 -d \ ) > ../step_span_id
          curl -L -o /usr/local/bin/buildevents https://github.com/honeycombio/buildevents/releases/download/v0.7.1/buildevents-linux-amd64
          chmod 755 /usr/local/bin/buildevents
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - name: Install dependencies
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-install -- yarn install --immutable
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-artifacts
      - name: Run tests
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-test -- yarn test
      - name: Finish step
        run: buildevents step $GITHUB_RUN_ID $(cat ../step_span_id) $(cat ../step_start) node-test

  chromatic:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: install honeycomb buildevents tool
        run: |
          echo $(date +%s) > ../step_start
          echo $(echo node-typecheck | sum | cut -f 1 -d \ ) > ../step_span_id
          curl -L -o /usr/local/bin/buildevents https://github.com/honeycombio/buildevents/releases/download/v0.7.1/buildevents-linux-amd64
          chmod 755 /usr/local/bin/buildevents
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - name: Install dependencies
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../step_span_id) yarn-install -- yarn install --immutable
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-artifacts
      - name: Build Storybook
        working-directory: packages/web
        run: buildevents cmd $GITHUB_RUN_ID $(cat ../../../step_span_id) yarn-build-storybook -- yarn build-storybook
      - name: Run Chromatic
        uses: chromaui/action@5ec258af08deb3e8c36653bd618cb7fe52090031 # v15.2.0
        with:
          storybookBuildDir: 'packages/web/storybook-static'
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitOnceUploaded: true
          storybookBaseDir: 'packages/web'
          autoAcceptChanges: 'main'
