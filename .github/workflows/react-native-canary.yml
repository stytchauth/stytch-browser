name: 'React Native Canary'
on:
  workflow_dispatch: # Can be called manually
  workflow_call: # Can be called by other workflows
    secrets:
      EXPO_TOKEN:
        required: true
permissions:
  contents: read
jobs:
  configure:
    name: Configure Canary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Pre-install Globals
        run: npm install -g yarn

      - name: Configure Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Configure Canary
        working-directory: canaries/react-native-canary
        run: |
          echo "Resetting lockfile..."
          rm yarn.lock
          touch yarn.lock
          echo "... Lockfile reset"

          echo "Installing dependencies at 'latest'..."
          yarn --no-immutable
          echo "... all dependencies at 'latest'"

          echo "Run expo-doctor to pin versions..."
          npx expo install --fix
          echo "... dependencies pinned"

          echo "Canary is configured"

      - name: Upload relevant package data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: react-native-canary-data
          path: |
            ./canaries/react-native-canary/package.json
            ./canaries/react-native-canary/yarn.lock

  build:
    name: Build ${{ matrix.platform }}
    needs: [configure]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest-16-cores
            platform: android
          - runner: macos-latest
            platform: ios
    runs-on: ${{ matrix.runner }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Pre-install Globals
        run: npm install -g yarn eas-cli

      - name: Configure Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        if: ${{ matrix.platform == 'android' }}
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        if: ${{ matrix.platform == 'android' && env.ACT }}
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Select correct version of XCode
        if: ${{ matrix.platform == 'ios' }}
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Overwrite relevant data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: react-native-canary-data
          path: ./canaries/react-native-canary/

      - name: Install JS dependencies
        working-directory: canaries/react-native-canary
        run: |
          yarn install --no-immutable

      - name: Build App
        working-directory: canaries/react-native-canary
        run: |
          EXPO_TOKEN=$EXPO_TOKEN eas build -e production -p ${{ matrix.platform }} --local --non-interactive
