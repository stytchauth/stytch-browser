name: Run E2E Tests
on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      vercel_b2c_project:
        required: false
        type: string
        default: ''
      vercel_b2b_project:
        required: false
        type: string
        default: ''
      cypress_base_url:
        required: false
        type: string
        default: ''
      cypress_b2b_base_url:
        required: false
        type: string
        default: ''
    secrets:
      cypress_mailosaur_api_key:
        required: true
      cypress_mailosaur_server_id:
        required: true
      cypress_record_key:
        required: true
      vercel_token:
        required: false

jobs:
  get-vercel-deployment-url:
    if: ${{ inputs.vercel_b2c_project != '' || inputs.vercel_b2b_project != '' }}
    runs-on: ubuntu-latest
    outputs:
      b2c_url: ${{ steps.vercel_b2c.outputs.url }}
      b2b_url: ${{ steps.vercel_b2b.outputs.url }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          persist-credentials: false

      - name: Make script executable
        run: chmod +x .github/scripts/get-vercel-preview-url.sh

      # Get Vercel preview deployment URLs using Vercel API
      - name: Get Vercel B2C deployment URL
        if: ${{ inputs.vercel_b2c_project != '' }}
        id: vercel_b2c
        env:
          VERCEL_TOKEN: ${{ secrets.vercel_token }}
          VERCEL_PROJECT: ${{ inputs.vercel_b2c_project }}
          GIT_REF: ${{ github.head_ref || github.ref }}
        run: |
          DEPLOYMENT_URL=$(.github/scripts/get-vercel-preview-url.sh \
            "$VERCEL_PROJECT" \
            "$GIT_REF")
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

      - name: Get Vercel B2B deployment URL
        if: ${{ inputs.vercel_b2b_project != '' }}
        id: vercel_b2b
        env:
          VERCEL_TOKEN: ${{ secrets.vercel_token }}
          VERCEL_PROJECT: ${{ inputs.vercel_b2b_project }}
          GIT_REF: ${{ github.head_ref || github.ref }}
        run: |
          DEPLOYMENT_URL=$(.github/scripts/get-vercel-preview-url.sh \
            "$VERCEL_PROJECT" \
            "$GIT_REF")
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

  run-e2e-tests:
    # Explicit always() needed since get-vercel-deployment-url is optional. Otherwise, this job will also be skipped if
    # get-vercel-deployment-url is skipped
    if: always()
    needs: get-vercel-deployment-url
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:22.19.0
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          persist-credentials: false
      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'

      # If we let Cypress handle installing, we run into strange file permission issues
      # Easier for us to install ourselves. the "focus" command only installs dependencies for the e2e-tests package
      - name: Install node dependencies
        run: yarn workspaces focus e2e-tests

      - name: Cypress run
        uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 # v6.10.9
        env:
          ENV: ${{ inputs.env }}
          CYPRESS_BASE_URL: ${{ needs.get-vercel-deployment-url.outputs.b2c_url || inputs.cypress_base_url }}
          CYPRESS_B2B_BASE_URL: ${{ needs.get-vercel-deployment-url.outputs.b2b_url || inputs.cypress_b2b_base_url }}
          CYPRESS_MAILOSAUR_API_KEY: ${{ secrets.cypress_mailosaur_api_key }}
          CYPRESS_MAILOSAUR_SERVER_ID: ${{ secrets.cypress_mailosaur_server_id }}
          CYPRESS_RECORD_KEY: ${{ secrets.cypress_record_key }}
          GITHUB_TOKEN: ${{ secrets.github_token }}
        with:
          install: false
          record: true
          working-directory: services/e2e-tests
